<!DOCTYPE html>
<html lang="th">

<head>

    <meta charset="UTF-8">
    <title>ชำระเงิน</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            overflow-x: hidden;
        }

        /* bubbles */

        .bubble {
            position: absolute;
            bottom: -100px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            animation: float 10s infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-1000px);
            }
        }

        /* navbar */

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 80px;
            background: rgba(0, 0, 0, 0.4);
        }

        .menu a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            padding: 8px 16px;
            border-radius: 8px;
        }

        .menu a:hover {
            background: #007bff;
        }

        /* container */

        .container {
            padding: 40px 80px;
        }

        h1 {
            text-align: center;
        }

        .subtitle {
            text-align: center;
            opacity: 0.8;
        }

        /* tabs */

        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .tabs button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #444;
            color: white;
        }

        .tabs .active {
            background: #007bff;
        }

        /* layout */

        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        /* cards */

        .qr-card,
        .card-form,
        .timer-card,
        .price-card {

            background: white;
            color: black;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin-bottom: 20px;

        }

        /* QR */

        #qrcode {

            background: white;
            padding: 20px;
            border-radius: 15px;

            box-shadow:
                0 10px 25px rgba(0, 0, 0, 0.4),
                inset 0 3px 6px rgba(0, 0, 0, 0.2);

            width: fit-content;
            margin: auto;

        }

        /* buttons */

        button {
            padding: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
        }

        .pay-btn,
        .confirm-btn {

            width: 100%;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            box-shadow: 0 6px 0 #0047b3;

        }

        .pay-btn:active,
        .confirm-btn:active {

            transform: translateY(5px);
            box-shadow: 0 2px 0 #0047b3;

        }

        /* form */

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        /* timer */

        .timer {
            font-size: 30px;
            font-weight: bold;
            text-align: center;
            color: #007bff;
        }

        /* price */

        .price-card {
            text-align: center;
        }

        .price-blue {
            font-size: 25px;
            font-weight: bold;
            color: #007bff;
        }

        /* back */

        .back-btn {
            width: 100%;
            background: #555;
            color: white;
            margin-top: 10px;
        }

        /* loader */

        .loader {

            border: 5px solid #eee;
            border-top: 5px solid #007bff;
            border-radius: 50%;
            width: 30px;
            height: 30px;

            animation: spin 1s linear infinite;
            margin: 10px auto;

        }

        @keyframes spin {

            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }

        }
    </style>

</head>

<body>

    <!-- bubbles -->

    <div class="bubble" style="left:10%"></div>
    <div class="bubble" style="left:30%;width:60px;height:60px"></div>
    <div class="bubble" style="left:50%"></div>
    <div class="bubble" style="left:70%"></div>
    <div class="bubble" style="left:90%"></div>

    <!-- navbar -->

    <div class="navbar">

        <div class="logo">แม่กา คาร์วอช</div>

        <div class="menu">
            <a href="home.html">หน้าแรก</a>
            <a href="booking.html">จองบริการ</a>
            <a href="history.html">ประวัติการจอง</a>
            <a href="#" onclick="logout()">ออกจากระบบ</a>
        </div>

    </div>

    <div class="container">

        <h1>ชำระเงิน</h1>

        <p class="subtitle">
            กรุณาสแกน QR CODE หรือเลือกวิธีชำระเงิน
        </p>

        <!-- tabs -->

        <div class="tabs">

            <button id="qrBtn" class="active" onclick="showQR()">
                Thai QR Payment
            </button>

            <button id="cardBtn" onclick="showCard()">
                บัตรเครดิต/เดบิต
            </button>

        </div>

        <div class="grid">

            <!-- LEFT -->

            <div>

                <div id="qrBox">

                    <div class="qr-card">

                        <h3 style="text-align:center;color:#007bff">PromptPay</h3>

                        <div id="qrcode"></div>

                    </div>

                    <button class="pay-btn" onclick="startQR()">
                        แจ้งการชำระเงิน
                    </button>

                    <div id="loading" style="display:none;text-align:center">

                        <div class="loader"></div>

                        <p>กำลังตรวจสอบการชำระเงิน...</p>

                    </div>

                </div>

                <div id="cardBox" style="display:none">

                    <div class="card-form">

                        <input type="text" placeholder="ชื่อบนบัตร">
                        <input type="text" placeholder="เลขบัตรเครดิต">

                        <div class="row">
                            <input type="text" placeholder="MM/YY">
                            <input type="text" placeholder="CVV">
                        </div>

                        <button class="confirm-btn" onclick="confirmPayment()">
                            ชำระเงิน
                        </button>

                    </div>

                </div>

            </div>

            <!-- RIGHT -->

            <div>

                <div class="timer-card">

                    <p>กรุณาชำระเงินภายใน</p>

                    <div class="timer">
                        <span id="minutes">15</span> :
                        <span id="seconds">00</span>
                    </div>

                </div>

                <div class="price-card">

                    <p>ยอดที่ต้องชำระ</p>

                    <p class="price-blue">
                        <span id="price">0</span> บาท
                    </p>

                </div>

                <a href="summary.html">
                    <button class="back-btn">ย้อนกลับ</button>
                </a>

            </div>

        </div>

    </div>

    <script>

        /* ราคา */

        let price = localStorage.getItem("totalPrice");

        if (price) {
            document.getElementById("price").innerText = price;
        }

        /* QR CODE */

        const qrElement = document.getElementById("qrcode");

        if (qrElement) {

            new QRCode(qrElement, {
                text: "PromptPay:0812345678 | Amount:" + price,
                width: 200,
                height: 200
            });

        }

        /* tab */

        function showQR() {

            document.getElementById("qrBox").style.display = "block";
            document.getElementById("cardBox").style.display = "none";

            document.getElementById("qrBtn").classList.add("active");
            document.getElementById("cardBtn").classList.remove("active");

        }

        function showCard() {

            document.getElementById("qrBox").style.display = "none";
            document.getElementById("cardBox").style.display = "block";

            document.getElementById("cardBtn").classList.add("active");
            document.getElementById("qrBtn").classList.remove("active");

        }

        /* timer */

        let time = 15 * 60;

        const timer = setInterval(function () {

            let minutes = Math.floor(time / 60);
            let seconds = time % 60;

            document.getElementById("minutes").innerText = minutes;
            document.getElementById("seconds").innerText =
                seconds < 10 ? "0" + seconds : seconds;

            time--;

            if (time < 0) {

                clearInterval(timer);

                alert("หมดเวลาชำระเงิน");

                window.location.href = "booking.html";

            }

        }, 1000);

        /* แจ้งชำระเงิน */

        function startQR() {

            const btn = document.querySelector(".pay-btn");
            const loading = document.getElementById("loading");

            btn.style.display = "none";
            loading.style.display = "block";

            setTimeout(function () {

                window.location.href = "booking-success.html";

            }, 3000);

        }

        /* ชำระบัตร */

        function confirmPayment() {

            alert("ชำระเงินสำเร็จ");

            window.location.href = "booking-success.html";

        }

    </script>

</body>

</html>
