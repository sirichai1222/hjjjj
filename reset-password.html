<!DOCTYPE html>
<html lang="th">

<head>

    <meta charset="UTF-8">
    <title>ตั้งรหัสผ่านใหม่</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            flex-direction: column;
            color: white;
            overflow: hidden;
        }

        /* bubbles */

        .bubble {
            position: absolute;
            bottom: -100px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: float 12s infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0)
            }

            100% {
                transform: translateY(-1000px)
            }
        }

        /* navbar */

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 80px;
            background: rgba(0, 0, 0, 0.35);
        }

        .menu a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            padding: 8px 16px;
            border-radius: 8px;
        }

        .menu a:hover {
            background: #007bff;
        }

        /* center */

        .center-box {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* card */

        .box {

            width: 380px;

            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);

            padding: 40px;

            border-radius: 20px;

            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);

            text-align: center;

        }

        /* icon */

        .icon {
            font-size: 45px;
            margin-bottom: 10px;
        }

        /* subtitle */

        .subtitle {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        /* input */

        label {
            display: block;
            text-align: left;
            font-size: 14px;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            margin-top: 5px;
            outline: none;
        }

        /* button */

        button {

            width: 100%;
            padding: 12px;

            border: none;
            border-radius: 10px;

            background: linear-gradient(135deg, #00c6ff, #0072ff);

            color: white;

            font-size: 15px;

            cursor: pointer;

            margin-top: 15px;

            box-shadow: 0 6px 0 #0047b3;

        }

        button:active {

            transform: translateY(4px);
            box-shadow: 0 2px 0 #0047b3;

        }

        /* loader */

        .loader {

            display: none;

            border: 5px solid #eee;
            border-top: 5px solid #00c6ff;

            border-radius: 50%;

            width: 30px;
            height: 30px;

            animation: spin 1s linear infinite;

            margin: 15px auto;

        }

        @keyframes spin {

            0% {
                transform: rotate(0)
            }

            100% {
                transform: rotate(360deg)
            }

        }

        /* success */

        .success {

            display: none;

            margin-top: 15px;

            background: #2ecc71;

            padding: 12px;

            border-radius: 10px;

            font-size: 14px;

        }
    </style>

</head>

<body>

    <!-- bubbles -->

    <div class="bubble" style="left:10%"></div>
    <div class="bubble" style="left:30%;width:60px;height:60px"></div>
    <div class="bubble" style="left:50%"></div>
    <div class="bubble" style="left:70%"></div>
    <div class="bubble" style="left:90%"></div>

    <!-- NAVBAR -->

    <div class="navbar">

        <div class="logo">
            แม่กา คาร์วอช
        </div>

        <div class="menu">
            <a href="home.html">หน้าแรก</a>
            <a href="booking.html">จองบริการ</a>
            <a href="#">บริการของเรา</a>
            <a href="#" onclick="logout()">ออกจากระบบ</a>
        </div>

    </div>

    <!-- BOX -->

    <div class="center-box">

        <div class="box">

            <div class="icon">🔑</div>

            <h2>ตั้งรหัสผ่านใหม่</h2>

            <p class="subtitle">
                กรุณากรอกรหัสผ่านใหม่ของคุณ
            </p>

            <label>รหัสผ่านใหม่</label>
            <input type="password" id="pass1" placeholder="กรอกรหัสผ่านใหม่">

            <label>ยืนยันรหัสผ่าน</label>
            <input type="password" id="pass2" placeholder="กรอกรหัสผ่านอีกครั้ง">

            <button onclick="resetPass()">
                บันทึกรหัสผ่านใหม่
            </button>

            <div class="loader" id="loader"></div>

            <div class="success" id="successBox">
                ✔ เปลี่ยนรหัสผ่านสำเร็จ กำลังกลับไปหน้าเข้าสู่ระบบ
            </div>

        </div>

    </div>

    <script>

        function resetPass() {

            let p1 = document.getElementById("pass1").value;
            let p2 = document.getElementById("pass2").value;

            if (p1 !== p2) {

                alert("รหัสผ่านไม่ตรงกัน");

                return;

            }

            document.getElementById("loader").style.display = "block";

            setTimeout(function () {

                document.getElementById("loader").style.display = "none";

                document.getElementById("successBox").style.display = "block";

                setTimeout(function () {

                    window.location.href = "index.html";

                }, 2000);

            }, 1500);

        }

    </script>

</body>

</html>
