<!DOCTYPE html>
<html lang="th">

<head>

    <meta charset="UTF-8">
    <title>ลืมรหัสผ่าน</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* bubbles */

        .bubble {
            position: absolute;
            bottom: -100px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: float 12s infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0)
            }

            100% {
                transform: translateY(-1000px)
            }
        }

        /* navbar */

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 80px;
            background: rgba(0, 0, 0, 0.35);
        }

        .menu a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            padding: 8px 16px;
            border-radius: 8px;
        }

        .menu a:hover {
            background: #007bff;
        }

        /* center */

        .center-box {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* card */

        .box {

            width: 380px;

            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);

            padding: 40px;

            border-radius: 20px;

            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);

            text-align: center;

        }

        /* back */

        .back {
            color: #00c6ff;
            text-decoration: none;
            font-size: 14px;
            display: block;
            margin-bottom: 20px;
            text-align: left;
        }

        /* icon */

        .icon {
            font-size: 45px;
            margin-bottom: 10px;
        }

        /* subtitle */

        .subtitle {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        /* input */

        label {
            display: block;
            text-align: left;
            font-size: 14px;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            margin-bottom: 15px;
            outline: none;
        }

        /* button */

        button {

            width: 100%;
            padding: 12px;

            border: none;
            border-radius: 10px;

            background: linear-gradient(135deg, #00c6ff, #0072ff);

            color: white;

            font-size: 15px;
            cursor: pointer;

            box-shadow: 0 6px 0 #0047b3;

        }

        button:active {

            transform: translateY(4px);
            box-shadow: 0 2px 0 #0047b3;

        }

        /* success */

        .success {

            display: none;

            margin-top: 20px;

            background: #2ecc71;
            padding: 12px;

            border-radius: 10px;

            font-size: 14px;

        }

        /* loader */

        .loader {

            display: none;

            border: 5px solid #eee;
            border-top: 5px solid #00c6ff;

            border-radius: 50%;

            width: 30px;
            height: 30px;

            animation: spin 1s linear infinite;

            margin: 15px auto;

        }

        @keyframes spin {

            0% {
                transform: rotate(0)
            }

            100% {
                transform: rotate(360deg)
            }

        }
    </style>

</head>

<body>

    <!-- bubbles -->

    <div class="bubble" style="left:10%"></div>
    <div class="bubble" style="left:30%;width:60px;height:60px"></div>
    <div class="bubble" style="left:50%"></div>
    <div class="bubble" style="left:70%"></div>
    <div class="bubble" style="left:90%"></div>

    <!-- NAVBAR -->

    <div class="navbar">

        <div class="logo">
            🚗 แม่กา คาร์วอช
        </div>

        <div class="menu">
            <a href="home.html">หน้าแรก</a>
            <a href="booking.html">จองบริการ</a>
            <a href="#">บริการของเรา</a>
            <a class="login" href="index.html">เข้าสู่ระบบ</a>
        </div>

    </div>

    <!-- BOX -->

    <div class="center-box">

        <div class="box">

            <a class="back" href="index.html">
                ← กลับไปหน้าเข้าสู่ระบบ
            </a>

            <div class="icon">
                🔐
            </div>

            <h2>ลืมรหัสผ่าน ?</h2>

            <p class="subtitle">
                กรอกอีเมลของคุณเพื่อรับลิงก์ตั้งรหัสผ่านใหม่
            </p>

            <label>อีเมล</label>

            <input type="email" placeholder="carwash@email.com" id="email">

            <button onclick="sendReset()">
                ส่งลิงก์ตั้งรหัสผ่านใหม่
            </button>

            <div class="loader" id="loader"></div>

            <div id="successBox" class="success">
                ✔ เราได้ส่งลิงก์ไปยังอีเมลของคุณแล้ว กรุณาตรวจสอบ
            </div>

        </div>

    </div>

    <script>

        function sendReset() {

            let loader = document.getElementById("loader");
            let success = document.getElementById("successBox");
            let email = document.getElementById("email").value;

            /* ตรวจสอบว่าใส่อีเมลหรือยัง */

            if (email === "") {

                alert("กรุณากรอกอีเมลก่อน");
                return;

            }

            /* แสดง loading */

            loader.style.display = "block";

            /* จำลองการส่งลิงก์ */

            setTimeout(function () {

                loader.style.display = "none";
                success.style.display = "block";

                /* เด้งไปหน้าตั้งรหัสใหม่ */

                setTimeout(function () {

                    window.location.href = "reset-password.html";

                }, 2000);

            }, 2000);

        }

    </script>
</body>

</html>
